
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DxB Edge Insight | Investor Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-navy': '#0A192F',
                        'brand-gold': '#C9A86A',
                        'slate-grey': '#4A4F54',
                        'soft-grey': '#F8F9FA',
                        'pure-white': '#FFFFFF',
                        'growth-green': '#10B981',
                        'deep-forest': '#0A192F'
                    },
                    fontFamily: {
                        sans: ['Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Univers', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    animation: {
                        'marquee': 'marquee 45s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8F9FA;
            color: #0A192F;
            font-family: Helvetica, Arial, sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: Univers, Helvetica, Arial, sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(10, 25, 47, 0.1);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(10, 25, 47, 0.3);
        }
        .no-scrollbar {
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Custom animation utility if tailwind config isn't enough for the specific hover behavior */
        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }
    </style>
