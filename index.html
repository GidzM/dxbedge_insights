    <style>
        :root {
            --dxb-blue: #003E7F;
            --dxb-midnight: #001F3F;
            --skyline-grey: #F4F6F9;
            --sand-neutral: #E8E6E1;
            --gulf-gold: #C9A86A;
            --emerald: #0F8C6E;
            --warning: #E6A100;
            --error: #D64545;
        }
        body {
            background-color: var(--skyline-grey);
            color: var(--dxb-midnight);
            font-family: Inter, sans-serif;
            line-height: 1.6;
        }
        h1, h2, h3, h4 {
            font-family: Inter, sans-serif;
            color: var(--dxb-midnight);
        }
        h1 {
            font-size: clamp(2.2rem, 1.95rem + 1.3vw, 2.8rem);
            font-weight: 700;
            line-height: 1.15;
        }
        h2 {
            font-size: clamp(1.65rem, 1.45rem + 0.8vw, 2rem);
            font-weight: 600;
            line-height: 1.25;
        }
        h3 {
            font-size: clamp(1.3rem, 1.2rem + 0.6vw, 1.5rem);
            font-weight: 600;
            line-height: 1.3;
        }
        h4 {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.35;
        }
        .cta-primary {
            background: var(--dxb-blue);
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid var(--dxb-blue);
            transition: all 200ms ease;
        }
        .cta-primary:hover {
            background: var(--dxb-midnight);
            border-color: var(--dxb-midnight);
        }
        .cta-secondary {
            background: transparent;
            color: var(--dxb-blue);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            border: 2px solid var(--dxb-blue);
            transition: all 200ms ease;
        }
        .cta-secondary:hover {
            background: var(--dxb-blue);
            color: #ffffff;
        }
        .brand-card {
            background: var(--skyline-grey);
            border: 1px solid var(--sand-neutral);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        .brand-drawer {
            background: #ffffff;
            border: 1px solid var(--sand-neutral);
            border-radius: 12px;
            padding: 24px;
        }
        .brand-breadcrumbs {
            font-size: 0.875rem;
            color: #6B7280;
            margin-bottom: 24px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(10, 25, 47, 0.1);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(10, 25, 47, 0.3);
        }
        .custom-scrollbar-prominent {
            scrollbar-width: auto;
            scrollbar-color: rgba(201, 168, 106, 0.85) rgba(10, 25, 47, 0.08);
        }
        .custom-scrollbar-prominent::-webkit-scrollbar {
            width: 12px;
        }
        .custom-scrollbar-prominent::-webkit-scrollbar-track {
            background: rgba(10, 25, 47, 0.08);
        }
        .custom-scrollbar-prominent::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(201, 168, 106, 0.92), rgba(10, 25, 47, 0.55));
            border-radius: 999px;
            border: 2px solid rgba(10, 25, 47, 0.08);
        }
        .custom-scrollbar-prominent::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(201, 168, 106, 1), rgba(10, 25, 47, 0.7));
        }
        .no-scrollbar {
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hover-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hover-scrollbar::-webkit-scrollbar {
            height: 0;
        }
        @media (hover: hover) and (pointer: fine) {
            .hover-scrollbar:hover,
            .hover-scrollbar:focus-within {
                scrollbar-width: thin;
                scrollbar-color: rgba(201, 168, 106, 0.85) rgba(10, 25, 47, 0.08);
            }
            .hover-scrollbar:hover::-webkit-scrollbar,
            .hover-scrollbar:focus-within::-webkit-scrollbar {
                height: 10px;
            }
            .hover-scrollbar:hover::-webkit-scrollbar-track,
            .hover-scrollbar:focus-within::-webkit-scrollbar-track {
                background: rgba(10, 25, 47, 0.08);
            }
            .hover-scrollbar:hover::-webkit-scrollbar-thumb,
            .hover-scrollbar:focus-within::-webkit-scrollbar-thumb {
                background: linear-gradient(180deg, rgba(201, 168, 106, 0.92), rgba(10, 25, 47, 0.55));
                border-radius: 999px;
                border: 2px solid rgba(10, 25, 47, 0.08);
            }
        }
        @media (hover: none), (pointer: coarse) {
            .hover-scrollbar {
                scrollbar-width: thin;
                scrollbar-color: rgba(201, 168, 106, 0.85) rgba(10, 25, 47, 0.08);
            }
            .hover-scrollbar::-webkit-scrollbar {
                height: 8px;
            }
            .hover-scrollbar::-webkit-scrollbar-track {
                background: rgba(10, 25, 47, 0.08);
            }
            .hover-scrollbar::-webkit-scrollbar-thumb {
                background: linear-gradient(180deg, rgba(201, 168, 106, 0.92), rgba(10, 25, 47, 0.55));
                border-radius: 999px;
                border: 2px solid rgba(10, 25, 47, 0.08);
            }
        }
        /* Custom animation utility if tailwind config isn't enough for the specific hover behavior */
        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }
    </style>
